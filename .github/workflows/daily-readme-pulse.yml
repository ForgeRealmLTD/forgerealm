name: Daily README Pulse

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update daily pulse section
        run: node scripts/update-readme-pulse.js

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "Ishmam"
          git config user.email "ishmam.ahmed24@gmail.com"
          git add README.md
          git commit -m "docs: update daily project pulse"
          git push
